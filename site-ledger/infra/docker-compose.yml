services:
  postgres:
    image: postgres:16-alpine
    container_name: site-ledger-db
    environment:
      POSTGRES_DB: site_ledger
      POSTGRES_USER: siteledger
      POSTGRES_PASSWORD: siteledger123
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
