name: 🚀 Deploy Site Ledger to AWS EC2 instance

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  BACKEND_IMAGE: site-ledger-backend
  FRONTEND_IMAGE: site-ledger-frontend
  PROJECT_DIR: site-ledger

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_DIR }}/backend/pom.xml

      - name: Run Backend Tests
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: mvn test -B

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.PROJECT_DIR }}/frontend/package-lock.json

      - name: Run Frontend Lint
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        run: |
          npm ci
          npm run lint 2>/dev/null || echo "No lint script configured"

  build-and-push:
    name: 🐳 Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tags
        id: tags
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "BACKEND_TAG=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "BACKEND_LATEST=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_IMAGE }}:latest" >> $GITHUB_OUTPUT
          echo "FRONTEND_TAG=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "FRONTEND_LATEST=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_IMAGE }}:latest" >> $GITHUB_OUTPUT

      - name: Build & Push Backend Image
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: |
          docker build -t ${{ steps.tags.outputs.BACKEND_TAG }} .
          docker tag ${{ steps.tags.outputs.BACKEND_TAG }} ${{ steps.tags.outputs.BACKEND_LATEST }}
          docker push ${{ steps.tags.outputs.BACKEND_TAG }}
          docker push ${{ steps.tags.outputs.BACKEND_LATEST }}

      - name: Build & Push Frontend Image
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        run: |
          docker build -t ${{ steps.tags.outputs.FRONTEND_TAG }} .
          docker tag ${{ steps.tags.outputs.FRONTEND_TAG }} ${{ steps.tags.outputs.FRONTEND_LATEST }}
          docker push ${{ steps.tags.outputs.FRONTEND_TAG }}
          docker push ${{ steps.tags.outputs.FRONTEND_LATEST }}

  deploy:
    name: 📦 Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Sync code to EC2
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USERNAME }}
          SOURCE: "./"
          TARGET: "/home/ubuntu/app"
          ARGS: "-avz --delete --exclude='node_modules' --exclude='target' --exclude='.git' --exclude='android'"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: JWT_SECRET,DB_PASSWORD,AWS_ACCOUNT_ID,AWS_REGION
          script: |
            set -e
            cd /home/ubuntu/app/site-ledger

            # Ensure .env file exists with secrets from GitHub
            echo "🔐 Setting up environment variables..."
            cat > .env << EOF
            # PostgreSQL Password
            DB_PASSWORD=${DB_PASSWORD:-siteledger123}

            # JWT Secret (min 256-bit / 32 characters)
            JWT_SECRET=${JWT_SECRET}

            # Allowed CORS origins (comma-separated)
            CORS_ORIGINS=http://$(curl -s http://checkip.amazonaws.com 2>/dev/null || echo "localhost")
            EOF

            echo "🛑 Stopping and removing existing containers..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # Force-remove any lingering containers from previous failed runs
            echo "🧹 Force-removing any lingering containers..."
            docker rm -f site-ledger-db site-ledger-backend site-ledger-frontend 2>/dev/null || true

            # Determine ECR registry URL
            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            echo "🔑 Logging into Amazon ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            echo "📥 Pulling pre-built Docker images from ECR..."
            PULL_BACKEND=true
            docker pull ${ECR_REGISTRY}/site-ledger-backend:latest || PULL_BACKEND=false
            PULL_FRONTEND=true
            docker pull ${ECR_REGISTRY}/site-ledger-frontend:latest || PULL_FRONTEND=false

            # Tag ECR images with the explicit names used in docker-compose.prod.yml's image: field
            if [ "$PULL_BACKEND" = "true" ]; then
              docker tag ${ECR_REGISTRY}/site-ledger-backend:latest site-ledger-backend:latest
              echo "✅ Backend image pulled from ECR"
            else
              echo "⚠️ No backend image in ECR, will build from source"
            fi

            if [ "$PULL_FRONTEND" = "true" ]; then
              docker tag ${ECR_REGISTRY}/site-ledger-frontend:latest site-ledger-frontend:latest
              echo "✅ Frontend image pulled from ECR"
            else
              echo "⚠️ No frontend image in ECR, will build from source"
            fi

            echo "🐳 Starting Docker containers..."
            # NOTE: No --build flag — docker compose uses the image: tag if it exists,
            # or falls back to building from source if the image is missing.
            # The ECR pull + tag above provides the images when available.
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "⏳ Waiting for backend to become healthy..."
            TIMEOUT=120
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' site-ledger-backend 2>/dev/null || echo "")
              if [ "$HEALTH" = "healthy" ]; then
                echo "✅ Backend is healthy!"
                break
              fi
              echo "  Waiting... (${ELAPSED}s / ${TIMEOUT}s) status=${HEALTH:-unknown}"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            if [ "$HEALTH" != "healthy" ]; then
              echo "⚠️ Backend healthcheck did not pass within ${TIMEOUT}s. Checking logs..."
              docker logs site-ledger-backend --tail 50 2>/dev/null || true
            fi

            echo "🧹 Cleaning up old images..."
            docker image prune -af

            echo "✅ Deployment Complete!"
            echo "📋 Container Status:"
            docker compose -f docker-compose.prod.yml ps
